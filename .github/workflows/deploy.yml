name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy plotly networkx pytest

      - name: Download database from AUSCrawl (latest release asset)
        run: |
          curl -fL -o aus_courses.db.gz \
            https://github.com/DeadPackets/AUSCrawl/releases/latest/download/aus_courses.db.gz
          gunzip aus_courses.db.gz

      - name: Run tests
        run: pytest -q

      - name: Build site
        run: python build.py

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
